<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3DGS Line Renderer</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0a0a;
      color: #fff;
      font-family: system-ui, -apple-system, sans-serif;
      overflow: hidden;
    }
    canvas { display: block; width: 100vw; height: 100vh; }
    #controls {
      position: absolute;
      top: 16px;
      left: 16px;
      background: rgba(20, 20, 20, 0.85);
      padding: 16px 20px;
      border-radius: 8px;
      backdrop-filter: blur(8px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      min-width: 220px;
    }
    #controls h1 {
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 12px;
      color: #4fc3f7;
      letter-spacing: 0.5px;
    }
    .control-group {
      margin-bottom: 12px;
    }
    .control-group label {
      display: block;
      font-size: 12px;
      color: #aaa;
      margin-bottom: 4px;
    }
    .control-group label .hint {
      color: #666;
      font-size: 10px;
    }
    .section-title {
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: #4fc3f7;
      margin: 14px 0 8px;
      padding-bottom: 4px;
      border-bottom: 1px solid rgba(79, 195, 247, 0.2);
    }
    .section-title:first-child { margin-top: 0; }
    .control-group select,
    .control-group input[type="range"] {
      width: 100%;
      background: #222;
      border: 1px solid #444;
      color: #fff;
      padding: 4px 8px;
      border-radius: 4px;
      font-size: 12px;
    }
    .control-group input[type="range"] {
      padding: 0;
    }
    .value-display {
      font-size: 11px;
      color: #888;
      text-align: right;
      margin-top: 2px;
    }
    .info {
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px solid rgba(255, 255, 255, 0.1);
      font-size: 11px;
      color: #888;
      line-height: 1.5;
    }
    .info span { color: #ccc; }
  </style>
</head>
<body>
  <canvas id="canvas"></canvas>
  <div id="controls">
    <h1>3DGS Line Renderer</h1>
    <div class="control-group">
      <label>Render Mode</label>
      <select id="mode">
        <option value="wireframe">Wireframe (All Edges)</option>
        <option value="silhouette">Silhouette / Outline</option>
        <option value="curves">Generative Curves</option>
      </select>
    </div>

    <!-- Mesh controls -->
    <div id="mesh-controls">
      <div class="control-group">
        <label>Line Thickness</label>
        <input type="range" id="thickness" min="0.5" max="12" step="0.5" value="3" />
        <div class="value-display" id="thickness-val">3.0 px</div>
      </div>
      <div class="control-group">
        <label>Line Color</label>
        <select id="color">
          <option value="white">White</option>
          <option value="cyan">Cyan</option>
          <option value="orange">Orange</option>
          <option value="rainbow">Rainbow (by normal)</option>
        </select>
      </div>
    </div>

    <!-- Curve controls -->
    <div id="curve-controls" style="display:none;">
      <div class="section-title">Gaussian Splat Params</div>
      <div class="control-group">
        <label>Tube Radius <span class="hint">(perpendicular σ — XY)</span></label>
        <input type="range" id="curve-radius" min="0.5" max="20" step="0.5" value="4" />
        <div class="value-display" id="curve-radius-val">4.0</div>
      </div>
      <div class="control-group">
        <label>Coverage / Overlap <span class="hint">(along-curve σ)</span></label>
        <input type="range" id="curve-overlap" min="0.5" max="2.5" step="0.05" value="1" />
        <div class="value-display" id="curve-overlap-val">1.00×</div>
      </div>
      <div class="control-group">
        <label>Global Scale <span class="hint">(all axes)</span></label>
        <input type="range" id="curve-scalemul" min="0.2" max="4" step="0.1" value="1" />
        <div class="value-display" id="curve-scalemul-val">1.0×</div>
      </div>
      <div class="control-group">
        <label>Opacity</label>
        <input type="range" id="curve-opacity" min="0.05" max="1" step="0.05" value="1" />
        <div class="value-display" id="curve-opacity-val">1.00</div>
      </div>

      <div class="section-title">Curve Shape</div>
      <div class="control-group">
        <label>Samples <span class="hint">(splats per curve — lower = fewer)</span></label>
        <input type="range" id="curve-samples" min="3" max="100" step="1" value="16" />
        <div class="value-display" id="curve-samples-val">16</div>
      </div>
      <div class="control-group">
        <label>Tangent Multiplier <span class="hint">(arc bulge)</span></label>
        <input type="range" id="curve-tmult" min="0.2" max="2" step="0.1" value="0.6" />
        <div class="value-display" id="curve-tmult-val">0.6×</div>
      </div>
      <div class="control-group">
        <label>Show Bunny Reference</label>
        <input type="checkbox" id="show-reference" checked />
      </div>
      <div class="control-group" style="display:flex;gap:8px;">
        <button id="gen-curve" style="flex:1;background:#222;border:1px solid #444;color:#fff;padding:6px 8px;border-radius:4px;cursor:pointer;font-size:12px;">Generate Curve</button>
        <button id="clear-curves" style="flex:1;background:#222;border:1px solid #444;color:#fff;padding:6px 8px;border-radius:4px;cursor:pointer;font-size:12px;">Clear</button>
      </div>
    </div>

    <div class="info">
      <span>Model:</span> Stanford Bunny<br>
      <span id="mesh-info"><span>Edges:</span> <span id="edge-count">-</span><br></span>
      <span id="curve-info" style="display:none;"><span>Curves:</span> <span id="curve-count">0</span> &nbsp;|&nbsp; <span>Segs:</span> <span id="seg-count">0</span><br></span>
      <span>Controls:</span> Left-drag to rotate, scroll to zoom
    </div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
